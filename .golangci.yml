run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - gocyclo
    - gofmt
    - goimports
    - gosec

linters-settings:
  gocyclo:
    min-complexity: 15

issues:
  exclude-rules:
    - path: internal/oc/generated.go
      linters:
        - gosec
        - errcheck
